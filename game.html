<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rum & Pirates — Game</title>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a; --parchment: #f2dfa7; --parch-dark: #e8c97a;
    --wood: #6b3a1f; --wood-light: #8b5e3c; --gold: #c9922a;
    --gold-light: #e8b84b; --ink: #1e1206; --red: #8b1a1a; --rope: #a07840;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--navy);
    font-family: 'Crimson Text', Georgia, serif;
    color: var(--parchment);
    overflow: hidden;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* ── Top bar ── */
  #topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,27,42,0.95);
    border-bottom: 2px solid var(--wood);
    padding: 6px 12px;
    height: 44px;
    z-index: 10;
  }
  #topbar .round-info {
    font-family: 'Pirata One', cursive;
    font-size: 1.1rem;
    color: var(--gold-light);
  }
  #topbar .room-info {
    font-size: 0.85rem;
    color: var(--rope);
    font-style: italic;
  }
  .topbar-btn {
    background: none;
    border: 1px solid var(--wood-light);
    border-radius: 3px;
    color: var(--parchment);
    font-size: 1.1rem;
    padding: 2px 10px;
    cursor: pointer;
  }

  /* ── Board area ── */
  #board-row {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-height: 0;
  }
  #board-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
    touch-action: none;
    min-width: 0;
  }
  #board-canvas {
    position: absolute;
    top: 190px; left: 0;
    image-rendering: crisp-edges;
  }

  /* ── Scorpion / roll contest overlay ── */
  #contest-overlay {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(13,27,42,0.92);
    border: 3px solid var(--gold);
    border-radius: 14px;
    padding: 16px 32px;
    z-index: 15;
    text-align: center;
    display: none;
    white-space: nowrap;
  }
  #contest-overlay .contest-turn {
    font-family: 'Pirata One', cursive;
    color: var(--gold-light);
    font-size: 2rem;
  }
  #contest-overlay .contest-progress {
    color: var(--parchment);
    font-size: 1.5rem;
    margin-top: 4px;
  }
  #contest-overlay .contest-progress strong {
    color: var(--gold-light);
  }

  /* ── Wrangle screen ── */
  #wrangle-screen {
    position: fixed;
    inset: 0;
    background: #d9bd8c;
    display: none;
    flex-direction: column;
    align-items: center;
    z-index: 55;
    overflow-y: auto;
    padding: 20px;
  }
  #wrangle-screen.open { display: flex; }
  .wrangle-header-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 4px;
    width: 100%;
    max-width: 460px;
    margin-bottom: 4px;
  }
  .wrangle-header-cell {
    font-family: 'Pirata One', cursive;
    color: var(--ink);
    font-size: 1.3rem;
    text-align: center;
  }
  .wrangle-body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    max-width: 460px;
  }
  .wrangle-side-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-shrink: 0;
  }
  .wrangle-active-col { align-items: flex-end; }
  .wrangle-safe-col { align-items: flex-start; }
  .wrangle-mast-wrap {
    width: 130px;
    flex-shrink: 0;
  }
  .wrangle-mast-wrap img {
    width: 100%;
    display: block;
  }
  .wrangle-player-row {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 26px;
  }
  .wrangle-active-col .wrangle-player-row { flex-direction: row; }
  .wrangle-safe-col .wrangle-player-row { flex-direction: row-reverse; }
  .wrangle-name {
    font-family: 'Pirata One', cursive;
    font-size: 1.1rem;
    color: var(--ink);
    white-space: nowrap;
  }
  .wrangle-dot-group {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    max-width: 90px;
  }
  .wrangle-dot {
    width: 15px; height: 15px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  .wrangle-status {
    font-family: 'Pirata One', cursive;
    color: var(--ink);
    font-size: 1.2rem;
    margin-top: 16px;
    text-align: center;
  }
  .wrangle-status p { margin-bottom: 6px; }

  /* ── Inventory overlay ── */
  #inventory-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,27,42,0.97);
    display: none;
    flex-direction: column;
    z-index: 65;
    padding: 14px;
  }
  #inventory-overlay.open { display: flex; }
  #inventory-overlay h3 {
    font-family: 'Pirata One', cursive;
    color: var(--gold-light);
    margin-bottom: 10px;
    text-align: center;
  }
  #inventory-content {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .inv-group-label {
    font-family: 'Pirata One', cursive;
    color: var(--gold-light);
    font-size: 1rem;
    margin-bottom: 4px;
  }
  .inv-cards {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .inv-card-wrap {
    position: relative;
    width: 60px;
  }
  .inv-card {
    width: 60px;
    display: block;
    border-radius: 4px;
    border: 1px solid var(--wood-light);
  }
  .inv-card-completed-badge {
    position: absolute;
    top: -6px; right: -6px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #2ecc71;
    border: 2px solid #1e1206;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: bold;
    font-size: 0.9rem;
  }

  /* ── Tableau side panel ── */
  #tableau-panel {
    position: absolute;
    top: 115px;
    left: 0;
    right: 0;

    overflow-x: auto;
    overflow-y: hidden;

    padding: 8px 16px;

    background: rgba(30,18,6,.85);
    border-top: 2px solid var(--rope);
    border-bottom: 2px solid var(--rope);
  }

  #tableau-strip {
    display: flex;
    justify-content: center;   /* Centers on large screens */
    align-items: flex-start;
    width: max-content;         /* Expands as cards are added */
    min-width: 100%;            /* Allows centering when there's room */
    margin: 0 auto;
  }

  .tableau-group {
    display: flex;
    gap: 4px;               /* gap between cards in a category */
    margin-right: 18px;     /* gap between categories */
    flex-shrink: 0;
  }

  .tableau-group:last-child {
    margin-right: 0;
  }

  .tableau-card-wrap {
    flex: 0 0 auto;
  }

  .tableau-card {
    width: 75px;
    height: 75px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid var(--wood-light);
    display: block;
  }

  /* ── Player status bar ── */
  #status-bar {
    position: absolute;
    top: 10px;         
    left: 0;
    width: 100%;
    height: auto;
    max-height: 120px;
    background: rgba(13, 27, 42, 0.95);
    border-bottom: 2px solid var(--gold);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    z-index: 10;
    padding: 4px 8px;
  }
  .player-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.95rem;
    padding: 3px 6px;
    border-radius: 3px;
    transition: background 0.2s;
  }
  .player-row.active {
    background: rgba(201,146,42,0.18);
    border-left: 3px solid var(--gold);
  }
  .player-row.inactive { border-left: 3px solid transparent; }
  .player-name { font-weight: 600; min-width: 70px; }
  .player-pirates { color: var(--rope); font-size: 0.85rem; }
  .player-barrels { color: #b0c4de; font-size: 0.85rem; }
  .player-coins { color: var(--gold-light); font-size: 0.85rem; }
  .active-crown { color: var(--gold-light); font-size: 0.9rem; }

  /* ── Action panel (slide-up) ── */
  #action-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1a2e42;
    border-top: 2px solid var(--wood);
    border-radius: 12px 12px 0 0;
    padding: 16px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 70;
    max-height: 60vh;
    overflow-y: auto;
  }
  #action-panel.open { transform: translateY(0); }
  #action-panel h3 {
    font-family: 'Pirata One', cursive;
    color: var(--gold-light);
    margin-bottom: 12px;
    font-size: 1.2rem;
  }
  .action-btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border: none;
    border-radius: 4px;
    font-family: 'Pirata One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    background: linear-gradient(160deg, var(--gold-light), var(--gold));
    color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .action-btn.secondary {
    background: linear-gradient(160deg, var(--wood-light), var(--wood));
    color: var(--parchment);
  }
  .action-btn:active { opacity: 0.85; }
  #panel-close {
    position: absolute;
    top: 10px; right: 14px;
    background: none;
    border: none;
    color: var(--rope);
    font-size: 1.4rem;
    cursor: pointer;
  }

  /* ── Action log ── */
  #log-panel {
    position: fixed;
    top: 44px; left: 0; right: 0; bottom: 0;
    background: rgba(13,27,42,0.97);
    z-index: 15;
    display: none;
    flex-direction: column;
    padding: 12px;
  }
  #log-panel.open { display: flex; }
  #log-panel h3 {
    font-family: 'Pirata One', cursive;
    color: var(--gold-light);
    margin-bottom: 8px;
  }
  #log-list {
    flex: 1;
    overflow-y: auto;
    font-size: 0.9rem;
    color: var(--parchment);
    line-height: 1.6;
  }
  #log-list p { border-bottom: 1px solid rgba(160,120,64,0.2); padding: 4px 0; }
  #log-close {
    margin-top: 10px;
    padding: 10px;
    background: var(--wood);
    border: none;
    border-radius: 4px;
    color: var(--parchment);
    font-family: 'Pirata One', cursive;
    font-size: 1rem;
    cursor: pointer;
  }

  /* ── Loading overlay ── */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  #loading h2 { font-family: 'Pirata One', cursive; color: var(--gold-light); font-size: 1.8rem; }
  #loading p { color: var(--rope); font-style: italic; }
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid rgba(160,120,64,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed;
    top: 54px; left: 50%; transform: translateX(-50%);
    background: rgba(107,58,31,0.95);
    color: var(--parchment);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-style: italic;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="loading">
  <h2>⚓ Rum &amp; Pirates</h2>
  <div class="spinner"></div>
  <p id="loading-msg">Connecting to server...</p>
</div>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <div>
      <div class="round-info" id="round-display">Round —</div>
      <div class="room-info" id="room-display">Room: —</div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="topbar-btn" onclick="toggleLog()">📜 Log</button>
      <button class="topbar-btn" onclick="toggleInventory()">🎒 Inventory</button>
      <button class="topbar-btn" onclick="toggleActionPanel()">☰ Actions</button>
    </div>
  </div>

  <!-- Board + Tableau -->
  <div id="board-row">
    <div id="board-wrapper">
      <canvas id="board-canvas"></canvas>
      <div id="contest-overlay">
        <div class="contest-turn" id="contest-turn-label"></div>
        <div class="contest-progress" id="contest-progress-label"></div>
      </div>
    </div>
    <div id="tableau-panel"></div>
  </div>

  <!-- Player status -->
  <div id="status-bar"></div>
</div>

<!-- Action panel -->
<div id="action-panel">
  <button id="panel-close" onclick="closeActionPanel()">✕</button>
  <h3>Actions</h3>
  <div id="action-buttons"></div>
</div>

<!-- Log panel -->
<div id="log-panel">
  <h3>📜 Action Log</h3>
  <div id="log-list"></div>
  <button id="log-close" onclick="toggleLog()">Close</button>
</div>

<!-- Wrangle screen -->
<div id="wrangle-screen"></div>

<!-- Inventory overlay -->
<div id="inventory-overlay">
  <h3>🎒 Your Inventory</h3>
  <div id="inventory-content"></div>
  <button id="log-close" onclick="toggleInventory()">Close</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const SERVER = "https://rumandpirates.up.railway.app";
const TILE_SIZE = 300; // matches GameSetup.py
const MAX_CONNECTION_DISTANCE = 80;

// ── State ─────────────────────────────────────────────────────────────────────
let socket = null;
let gameState = null;
let myName = "";
let myRoomId = null;
let myPlayerIndex = null;
let tileData = [];       // raw JSON for all 9 tiles
let tileImages = [];     // loaded Image objects
let boardSpaces = [];    // computed spaces with board_x, board_y
let spaceLoookup = {};
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isPanning = false;
let panStart = { x: 0, y: 0, ox: 0, oy: 0 };
let lastTouchDist = 0;

// ── Board generation (mirrors GameSetup.py) ───────────────────────────────────
function rotateNormalized(x, y, rotation) {
  if (rotation === 0)   return [x, y];
  if (rotation === 90)  return [1.0 - y, x];
  if (rotation === 180) return [1.0 - x, 1.0 - y];
  if (rotation === 270) return [y, 1.0 - x];
}

function buildBoardFromSeed(seed) {
  const tileLookup = {};
  tileData.forEach(t => { tileLookup[t.num_tile] = t; });

  let allSpaces = [];
  let nextId = 0;

  // find max id across all tiles first
  tileData.forEach(t => t.spaces.forEach(s => { if (s.id > nextId) nextId = s.id; }));
  nextId += 1;

  seed.forEach((entry, i) => {
    const tile = tileLookup[entry.tile_num];
    const rotation = entry.rotation;
    const col = i % 3;
    const row = Math.floor(i / 3);
    const offsetXt = col * TILE_SIZE;
    const offsetYt = row * TILE_SIZE;

    // deep copy spaces and rotate
    tile.spaces.forEach(space => {
      const [rx, ry] = rotateNormalized(space.x, space.y, rotation);
      const boardX = Math.round(rx * TILE_SIZE) + offsetXt;
      const boardY = Math.round(ry * TILE_SIZE) + offsetYt;
      allSpaces.push({
        ...JSON.parse(JSON.stringify(space)),
        tile_num: tile.num_tile,
        board_x: boardX,
        board_y: boardY,
        occupant: null,
        captain: false,
      });
    });
  });

  // build lookup
  let spaceLookup = {};
  allSpaces.forEach(s => { spaceLookup[s.id] = s; });

  // connect edge spaces
  // IMPORTANT: must match the server's merge order exactly (sorted by id,
  // index-based pairs) so the same new-space IDs land on the same
  // board_x/board_y here as they do in the server's space_lookup.
  const edgeSpaces = allSpaces.filter(s => s.type === "edge").sort((a, b) => a.id - b.id);
  const toRemove = new Set();
  const newSpaces = [];

  for (let a = 0; a < edgeSpaces.length; a++) {
    for (let b = a + 1; b < edgeSpaces.length; b++) {
      const sa = edgeSpaces[a], sb = edgeSpaces[b];
      if (toRemove.has(sa.id) || toRemove.has(sb.id)) continue;
      const dx = sa.board_x - sb.board_x;
      const dy = sa.board_y - sb.board_y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < MAX_CONNECTION_DISTANCE) {
        const midX = Math.round((sa.board_x + sb.board_x) / 2);
        const midY = Math.round((sa.board_y + sb.board_y) / 2);
        let neighborIds = [];
        sa.neighbors.forEach(n => { if (n !== sb.id) neighborIds.push(n); });
        sb.neighbors.forEach(n => { if (n !== sa.id) neighborIds.push(n); });
        neighborIds = [...new Set(neighborIds)];
        const newSpace = {
          id: nextId++, type: "normal", tile_num: null,
          board_x: midX, board_y: midY,
          neighbors: neighborIds, occupant: null, captain: false
        };
        newSpaces.push({ newSpace, edgeA: sa, edgeB: sb });
        toRemove.add(sa.id);
        toRemove.add(sb.id);
      }
    }
  }

  // update neighbor references for merged spaces
  newSpaces.forEach(({ newSpace, edgeA, edgeB }) => {
    newSpace.neighbors.forEach(nid => {
      const neighbor = spaceLookup[nid];
      if (!neighbor) return;
      neighbor.neighbors = neighbor.neighbors.map(x =>
        (x === edgeA.id || x === edgeB.id) ? newSpace.id : x
      );
    });
    allSpaces.push(newSpace);
    spaceLookup[newSpace.id] = newSpace;
  });

  allSpaces = allSpaces.filter(s => !toRemove.has(s.id));
  spaceLookup = {};
  allSpaces.forEach(s => { spaceLookup[s.id] = s; });

  // classify spaces
  allSpaces.forEach(s => {
    if (s.type === "edge" && s.neighbors.length === 1) s.type = "dark_alley";
    const isNormal = s.type === "normal" || s.type === "edge";
    const isDark = s.type === "dark_alley";
    s.captain_space = !isNormal && !isDark;
    s.clickable = !isNormal;  // dark alleys ARE clickable, only normal/edge aren't
    s.required_pirates = (isNormal || isDark) ? 1 : 0;
    s.hitbox_radius = s.clickable ? (s.type === "edge" ? 0.04 * TILE_SIZE : 0.07 * TILE_SIZE) : 0;
  });

  return { allSpaces, spaceLookup };
}

// ── Canvas rendering ──────────────────────────────────────────────────────────
const canvas = document.getElementById("board-canvas");
const ctx = canvas.getContext("2d");
const wrapper = document.getElementById("board-wrapper");

function resizeCanvas() {
  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
  renderBoard();
}

function renderBoard() {
  if (!gameState || tileImages.length < 9) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  const seed = gameState.board_seed;
  if (!seed) { ctx.restore(); return; }

  // Draw each tile image
  seed.forEach((entry, i) => {
    const col = i % 3, row = Math.floor(i / 3);
    const ox = col * TILE_SIZE, oy = row * TILE_SIZE;
    const img = tileImages[entry.tile_num - 1];
    if (!img) return;

    ctx.save();
    ctx.translate(ox + TILE_SIZE / 2, oy + TILE_SIZE / 2);
    ctx.rotate((entry.rotation * Math.PI) / 180);
    ctx.drawImage(img, -TILE_SIZE / 2, -TILE_SIZE / 2, TILE_SIZE, TILE_SIZE);
    ctx.restore();
  });

  // Draw space overlays
  const captainPos = gameState.captain_space;
  const legalMoves = gameState.legal_moves || [];
  const legalDestIds = new Set(legalMoves.map(m => m.destination));
  const isMyTurn = gameState.active_player === myPlayerIndex;

  boardSpaces.forEach(space => {
    const { board_x: bx, board_y: by, type, id } = space;

    // Captain piece
    if (id === captainPos) {
      ctx.beginPath();
      ctx.arc(bx, by, 20, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fill();
      ctx.strokeStyle = "#c9922a";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = "#1e1206";
      ctx.font = "bold 14px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("⚓", bx, by);
      return;
    }
  });

  // Draw occupied paths — players don't have board positions, only occupied paths
  const occupiedPaths = gameState.occupied_paths || [];
  occupiedPaths.forEach(path => {
    const player = gameState.players.find(p => p.id === path.player_id);
    if (!player) return;
    const c = player.color;
    const color = Array.isArray(c) ? `rgb(${c[0]},${c[1]},${c[2]})` : (c || "#fff");
    (path.path || []).forEach(spaceId => {
      const space = spaceLoookup[spaceId];
      if (!space) return;
      ctx.beginPath();
      ctx.arc(space.board_x, space.board_y, 5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    });
  });

  ctx.restore();
}

// ── Touch / pan / zoom ────────────────────────────────────────────────────────
function initBoardSize() {
  const boardPx = TILE_SIZE * 3;
  const ww = wrapper.clientWidth, wh = wrapper.clientHeight;
  scale = Math.min(ww, wh) / boardPx * 0.97;
  offsetX = (ww - boardPx * scale) / 2;
  offsetY = (wh - boardPx * scale) / 2;
}

canvas.addEventListener("pointerdown", e => {
  isPanning = true;
  panStart = { x: e.clientX, y: e.clientY, ox: offsetX, oy: offsetY };
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", e => {
  if (!isPanning) return;
  offsetX = panStart.ox + (e.clientX - panStart.x);
  offsetY = panStart.oy + (e.clientY - panStart.y);
  renderBoard();
});
canvas.addEventListener("pointerup", e => {
  const dx = Math.abs(e.clientX - panStart.x);
  const dy = Math.abs(e.clientY - panStart.y);
  if (dx < 8 && dy < 8) handleBoardTap(e.clientX, e.clientY);
  isPanning = false;
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  offsetX = mx - (mx - offsetX) * factor;
  offsetY = my - (my - offsetY) * factor;
  scale *= factor;
  renderBoard();
}, { passive: false });

// Pinch zoom
let activeTouches = {};
canvas.addEventListener("touchstart", e => {
  [...e.changedTouches].forEach(t => activeTouches[t.identifier] = t);
}, { passive: true });
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t => activeTouches[t.identifier] = t);
  const pts = Object.values(activeTouches);
  if (pts.length === 2) {
    const dx = pts[0].clientX - pts[1].clientX;
    const dy = pts[0].clientY - pts[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTouchDist > 0) {
      const factor = dist / lastTouchDist;
      const mx = (pts[0].clientX + pts[1].clientX) / 2;
      const my = (pts[0].clientY + pts[1].clientY) / 2;
      const rect = canvas.getBoundingClientRect();
      const lx = mx - rect.left, ly = my - rect.top;
      offsetX = lx - (lx - offsetX) * factor;
      offsetY = ly - (ly - offsetY) * factor;
      scale *= factor;
      renderBoard();
    }
    lastTouchDist = dist;
  }
}, { passive: false });
canvas.addEventListener("touchend", e => {
  [...e.changedTouches].forEach(t => delete activeTouches[t.identifier]);
  if (Object.keys(activeTouches).length < 2) lastTouchDist = 0;
}, { passive: true });

// ── Board tap handling ────────────────────────────────────────────────────────
function handleBoardTap(clientX, clientY) {
  if (!gameState || gameState.active_player !== myPlayerIndex) return;

  const rect = canvas.getBoundingClientRect();
  const bx = (clientX - rect.left - offsetX) / scale;
  const by = (clientY - rect.top - offsetY) / scale;

  if (gameState.phase === "dark_alley_start") {
    const entranceId = (gameState.dark_alley || {}).entry_space;
    for (const [idStr, exitMove] of Object.entries(gameState.alley_lookup || {})) {
      const exitId = parseInt(idStr);
      if (exitId === entranceId) continue;
      const boardSpace = spaceLoookup[exitId];
      if (!boardSpace || !boardSpace.hitbox_radius) continue;
      const dx = bx - boardSpace.board_x, dy = by - boardSpace.board_y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < boardSpace.hitbox_radius) {
        promptDarkAlleyExit(exitId, exitMove);
        return;
      }
    }
    return;
  }

  if (gameState.phase === "reclaim_1" || gameState.phase === "reclaim_2") {
    // Any captain_space or dark_alley space is a valid tap target — the
    // server decides whether it's actually a legal reclaim endpoint.
    for (const [idStr, boardSpace] of Object.entries(spaceLoookup)) {
      if (!boardSpace.hitbox_radius) continue;
      const dx = bx - boardSpace.board_x, dy = by - boardSpace.board_y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < boardSpace.hitbox_radius) {
        socket.emit("player_action", {
          room_id: myRoomId,
          type: "select_reclaim",
          space_id: parseInt(idStr),
          player_index: myPlayerIndex
        });
        return;
      }
    }
    return;
  }

  if (gameState.phase !== "start_turn" && gameState.phase !== "choose_action") return;

  const legalMoves = gameState.legal_moves || [];

  for (const move of legalMoves) {
    const boardSpace = spaceLoookup[move.destination];
    if (!boardSpace || !boardSpace.hitbox_radius) continue;
    const dx = bx - boardSpace.board_x, dy = by - boardSpace.board_y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < boardSpace.hitbox_radius) {
      promptMove(move);
      return;
    }
  }
}

function promptDarkAlleyExit(exitId, exitMove) {
  const container = document.getElementById("action-buttons");
  const entryMove = (gameState.dark_alley || {}).entry_move || { cost: 0 };
  const myPlayer = gameState.players[myPlayerIndex];
  const entryCost = entryMove.cost;
  const totalCost = entryCost + exitMove.cost;

  container.innerHTML = `
    <p style="color:var(--parchment);margin-bottom:12px;">
      Exit here for <strong style="color:var(--gold-light)">${totalCost} pirate${totalCost !== 1 ? 's' : ''}</strong> total
      (${entryCost} in, ${exitMove.cost} out)?
    </p>
  `;
  const confirmBtn = document.createElement("button");
  confirmBtn.className = "action-btn";
  confirmBtn.textContent = "✓ Confirm Exit";
  confirmBtn.onclick = () => {
    socket.emit("player_action", {
      room_id: myRoomId,
      type: "resolve_dark_alley",
      exit_id: exitId,
      player_index: myPlayerIndex
    });
    closeActionPanel();
  };
  const cancelBtn = document.createElement("button");
  cancelBtn.className = "action-btn secondary";
  cancelBtn.textContent = "✕ Choose a different alley";
  cancelBtn.onclick = closeActionPanel;
  container.appendChild(confirmBtn);
  container.appendChild(cancelBtn);
  document.getElementById("action-panel").classList.add("open");
}

function promptMove(move) {
  const container = document.getElementById("action-buttons");
  const boardSpace = spaceLoookup[move.destination];
  const spaceLabel = (boardSpace ? boardSpace.type : move.destination_type).replace(/_/g, ' ');
  container.innerHTML = `
    <p style="color:var(--parchment);margin-bottom:12px;">
      Move to <strong style="color:var(--gold-light)">${spaceLabel}</strong>
      for <strong style="color:var(--gold-light)">${move.cost} pirate${move.cost !== 1 ? 's' : ''}</strong>?
    </p>
  `;
  const confirmBtn = document.createElement("button");
  confirmBtn.className = "action-btn";
  confirmBtn.textContent = "✓ Confirm Move";
  confirmBtn.onclick = () => {
    socket.emit("player_action", {
      room_id: myRoomId,
      type: "move",
      destination_id: move.destination,
      player_index: myPlayerIndex
    });
    closeActionPanel();
  };
  const cancelBtn = document.createElement("button");
  cancelBtn.className = "action-btn secondary";
  cancelBtn.textContent = "✕ Cancel";
  cancelBtn.onclick = closeActionPanel;
  container.appendChild(confirmBtn);
  container.appendChild(cancelBtn);
  document.getElementById("action-panel").classList.add("open");
}

// ── Tableau panel ─────────────────────────────────────────────────────────────
const CARD_FOLDERS = {
  pubs: "pubs",
  maps: "maps",
  treasure: "treasure",
  scorpion: "treasure",
  wrangle_bunk: "wrangle",
  wrangle_hammock: "wrangle",
  wrangle_bedroll: "wrangle"
};

function cardImageUrl(category, card) {
  if (!card || !card.image_file) return "";
  const folder = CARD_FOLDERS[category] || category;
  return `${SERVER}/assets/${folder}/${card.image_file}`;
}

function renderTableau() {
    const panel = document.getElementById("tableau-panel");
    const tableau = gameState.tableau;
    const groups = [];

    if (tableau.pubs?.length) {
      groups.push({
        cards: tableau.pubs.map(card => ({ card, category: "pubs" }))
      });
    }

    if (tableau.maps?.length) {
      groups.push({
        cards: tableau.maps.map(card => ({ card, category: "maps" }))
      });
    }

    if (tableau.treasure) {
      groups.push({
        cards: [{ card: tableau.treasure, category: "treasure" }]
      });
    }

    if (tableau.scorpion) {
      groups.push({
        cards: [{ card: tableau.scorpion, category: "treasure" }]
      });
    }

    if (tableau.wrangle_bunk) {
        groups.push({ 
          card: tableau.wrangle_bunk, category: "wrangle" });
    }

    if (tableau.wrangle_hammock) {
        groups.push({ 
          card: tableau.wrangle_hammock, category: "wrangle" });
    }

    if (tableau.wrangle_bedroll) {
        groups.push({ 
          card: tableau.wrangle_bedroll, category: "wrangle" });
    }

    panel.innerHTML = `
        <div id="tableau-strip">
            ${groups.map(group => `
                <div class="tableau-group">
                    ${group.cards.map(({ card, category }) => `
                        <img
                            class="tableau-card"
                            src="${cardImageUrl(category, card)}"
                            onerror="this.style.display='none'"
                        >
                    `).join("")}
                </div>
            `).join("")}
        </div>
    `;
}

// ── Scorpion / roll contest overlay ────────────────────────────────────────────
function renderContestOverlay() {
  const overlay = document.getElementById("contest-overlay");
  const contest = gameState.scorpion_contest;
  const pub = gameState.pub;
  const fergusRoll = gameState.fergus_guard_roll;
  const wrangle = gameState.wrangle;
  const rollPhases = ["roll_start", "roll_no_barrels", "roll_with_barrels", "roll_with_rerolls"];

  const scorpionActive = contest && contest.contest_active && rollPhases.includes(gameState.phase);
  const pubActive = pub && pub.pub_active && rollPhases.includes(gameState.phase);
  const fergusActive = fergusRoll != null && rollPhases.includes(gameState.phase);
  const wrangleActive = wrangle && wrangle.active && rollPhases.includes(gameState.phase);

  if (!scorpionActive && !pubActive && !fergusActive && !wrangleActive) {
    overlay.style.display = "none";
    return;
  }

  const rollerIndex = gameState.phase === "roll_start"
    ? gameState.next_roller
    : (gameState.current_roll || {}).player;
  const roller = gameState.players[rollerIndex];
  const rollerName = roller ? roller.name : "Someone";

  if (scorpionActive) {
    document.getElementById("contest-turn-label").textContent = `🦂 ${rollerName}'s roll`;
    document.getElementById("contest-progress-label").innerHTML =
      `<strong>${contest.total}</strong> / ${contest.target} to get stung`;
  } else if (fergusActive) {
    document.getElementById("contest-turn-label").textContent = `⚔️ ${rollerName} moves in!`;
    document.getElementById("contest-progress-label").innerHTML =
      `Needs <strong>${fergusRoll.guard_points}</strong> or higher to steal the guard`;
  } else if (wrangleActive) {
    document.getElementById("contest-turn-label").textContent = `🛏️ ${rollerName}'s roll`;
    if (wrangle.leader !== null && wrangle.leader !== undefined) {
      const leaderName = (gameState.players[wrangle.leader] || {}).name || "?";
      document.getElementById("contest-progress-label").innerHTML =
        `Beat <strong>${leaderName}</strong>'s roll of <strong>${wrangle.leader_roll}</strong> for a bunk`;
    } else {
      document.getElementById("contest-progress-label").innerHTML = `Wrangle`;
    }
  } else {
    const participantNames = pub.participants.map(i => (gameState.players[i] || {}).name || "?").join(", ");
    document.getElementById("contest-turn-label").textContent = `🍺 ${rollerName}'s roll`;
    document.getElementById("contest-progress-label").innerHTML =
      `Rolling — ${participantNames}`;
  }

  overlay.style.display = "block";
}

// ── Wrangle screen ────────────────────────────────────────────────────────────

  const screen = document.getElementById("wrangle-screen");
  screen.classList.add("open");

  const wrangle = gameState.wrangle;
  const players = (gameState.players || []).slice().sort((a, b) => a.board_position - b.board_position);

  const rollerIndex = gameState.phase === "roll_start"
    ? gameState.next_roller
    : (gameState.current_roll || {}).player;
  const rollerName = (gameState.players[rollerIndex] || {}).name || "—";

  let leaderHtml = "No one has rolled yet";
  if (wrangle.leader !== null && wrangle.leader !== undefined) {
    const leaderName = (gameState.players[wrangle.leader] || {}).name || "?";
    leaderHtml = `${leaderName} (rolled ${wrangle.leader_roll})`;
  }

  screen.innerHTML = `
    <div class="wrangle-header-row">
      <div class="wrangle-header-cell" style="width:140px;">Active</div>
      <div style="width:130px;"></div>
      <div class="wrangle-header-cell" style="width:140px;">Safe</div>
    </div>
    <div class="wrangle-body">
      <div class="wrangle-side-col wrangle-active-col">
        ${players.map(p => {
          const c = p.color;
          const colorCss = Array.isArray(c) ? `rgb(${c[0]},${c[1]},${c[2]})` : (c || '#333');
          const activeDots = Array(p.wrangle_pirates || 0).fill(0)
            .map(() => `<div class="wrangle-dot" style="background:${colorCss};"></div>`).join("");
          return `
            <div class="wrangle-player-row">
              <div class="wrangle-name">${p.name}</div>
              <div class="wrangle-dot-group">${activeDots}</div>
            </div>
          `;
        }).join("")}
      </div>

      <div class="wrangle-mast-wrap">
        <img src="${SERVER}/assets/wrangle/Wrangle.png" onerror="this.style.display='none'">
      </div>

      <div class="wrangle-side-col wrangle-safe-col">
        ${players.map(p => {
          const c = p.color;
          const colorCss = Array.isArray(c) ? `rgb(${c[0]},${c[1]},${c[2]})` : (c || '#333');
          const safeDots = Array(p.safe_pirates || 0).fill(0)
            .map(() => `<div class="wrangle-dot" style="background:${colorCss};"></div>`).join("");
          return `
            <div class="wrangle-player-row">
              <div class="wrangle-dot-group">${safeDots}</div>
            </div>
          `;
        }).join("")}
      </div>
    </div>
    <div class="wrangle-status">
      <p>Rolling: ${rollerName}</p>
      <p>Leader: ${leaderHtml}</p>
    </div>
  `;
}

// ── Game over ─────────────────────────────────────────────────────────────────
function renderGameOver() {
  let overlay = document.getElementById("game-over-overlay");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "game-over-overlay";
    overlay.style.cssText = `
      position:fixed; inset:0; background:#1e1206;
      display:flex; flex-direction:column; align-items:center;
      justify-content:flex-start; z-index:60; padding:24px 16px; gap:16px;
      overflow-y:auto;
    `;
    document.body.appendChild(overlay);
  }

  const categories = [
    { key: "pubs", label: "Pubs" },
    { key: "maps", label: "Maps" },
    { key: "guards", label: "Guards" },
    { key: "treasure", label: "Treasure" },
    { key: "scorpions", label: "Scorpions" },
    { key: "supplies", label: "Supplies" },
    { key: "rendezvous", label: "Rendezvous" },
    { key: "wrangle", label: "Wrangle" }
  ];

  const players = (gameState.players || []).slice().sort(
    (a, b) => ((b.score || {}).total || 0) - ((a.score || {}).total || 0)
  );

  const rows = players.map((p, i) => {
    const c = p.color;
    const colorCss = Array.isArray(c) ? `rgb(${c[0]},${c[1]},${c[2]})` : (c || '#fff');
    const score = p.score || {};
    const cells = categories.map(cat => `<td style="text-align:center; padding:6px 8px;">${score[cat.key] || 0}</td>`).join("");
    return `
      <tr style="background:${i === 0 ? 'rgba(201,146,42,0.15)' : 'transparent'};">
        <td style="padding:6px 8px; color:${colorCss}; font-weight:600; white-space:nowrap;">${i === 0 ? '👑 ' : ''}${p.name}</td>
        ${cells}
        <td style="text-align:center; padding:6px 8px; color:#e8b84b; font-family:'Pirata One',cursive; font-size:1.1rem;">${score.total || 0}</td>
      </tr>
    `;
  }).join("");

  const headerCells = categories.map(cat => `<th style="padding:6px 8px; font-size:0.8rem; color:var(--gold-light); font-weight:normal;">${cat.label}</th>`).join("");

  overlay.innerHTML = `
    <h2 style="font-family:'Pirata One',cursive;color:#e8b84b;font-size:2rem;">🏴‍☠️ Game Over!</h2>
    <div style="width:100%; max-width:700px; overflow-x:auto;">
      <table style="width:100%; border-collapse:collapse; color:var(--parchment); font-size:0.95rem;">
        <thead>
          <tr style="border-bottom:2px solid var(--wood-light);">
            <th style="padding:6px 8px; text-align:left; color:var(--gold-light); font-weight:normal;">Player</th>
            ${headerCells}
            <th style="padding:6px 8px; color:var(--gold-light); font-weight:normal;">Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="action-btn" style="max-width:220px;" onclick="window.location.href='/'">Back to Lobby</button>
  `;
}

// ── UI updates ────────────────────────────────────────────────────────────────
function updateUI() {
  if (!gameState) return;

  const wrangleActive = gameState.wrangle && gameState.wrangle.active;

  if (gameState.phase === "character_select") {
    document.getElementById("board-row").style.display = "none";
    document.getElementById("status-bar").style.display = "none";
    document.getElementById("wrangle-screen").classList.remove("open");
    document.getElementById("action-panel").classList.remove("open");
    renderCharacterSelect();
    return;
  } else if (gameState.phase === "game_over") {
    document.getElementById("board-row").style.display = "none";
    document.getElementById("status-bar").style.display = "none";
    document.getElementById("wrangle-screen").classList.remove("open");
    document.getElementById("action-panel").classList.remove("open");
    renderGameOver();
    return;
  } else if (wrangleActive) {
    document.getElementById("board-row").style.display = "none";
    document.getElementById("status-bar").style.display = "none";
    const overlay = document.getElementById("character-select-overlay");
    if (overlay) overlay.remove();
    const goOverlay = document.getElementById("game-over-overlay");
    if (goOverlay) goOverlay.remove();
    renderWrangleScreen();
    return;
  } else {
    document.getElementById("board-row").style.display = "";
    document.getElementById("status-bar").style.display = "";
    document.getElementById("wrangle-screen").classList.remove("open");
    const overlay = document.getElementById("character-select-overlay");
    if (overlay) overlay.remove();
    const goOverlay = document.getElementById("game-over-overlay");
    if (goOverlay) goOverlay.remove();
  }

  document.getElementById("round-display").textContent = `Round ${gameState.round || "—"}`;
  document.getElementById("room-display").textContent = `Room: ${myRoomId || "—"}`;

  renderTableau();
  renderContestOverlay();

  if (document.getElementById("inventory-overlay").classList.contains("open")) {
    renderInventory();
  }

  // Status bar
  const bar = document.getElementById("status-bar");
  bar.innerHTML = "";
  (gameState.players || []).forEach((player, i) => {
    const isActive = i === gameState.active_player;
    const total = 15 - (player.pirate_reserve || 0);
    const div = document.createElement("div");
    div.className = `player-row ${isActive ? "active" : "inactive"}`;
    const c = player.color;
    const colorCss = Array.isArray(c) ? `rgb(${c[0]},${c[1]},${c[2]})` : (c || '#fff');
    const myCoins = (i === myPlayerIndex && player.coins !== undefined) ? player.coins : null;
    const coinsHtml = myCoins !== null
      ? `<span class="player-coins">🪙 ${player.coins || 0}</span>`
      : '';
    const myScore = (i === myPlayerIndex && player.score) ? player.score.total : null;
    const scoreHtml = myScore !== null
      ? `<span class="player-coins" style="color:var(--gold-light); font-weight:600;">🏆 ${myScore}</span>`
      : '';
    const boarded = player.board_position > 0;
    const boardedFlagHtml = boarded 
      ? `<span class="boarded-flag" title="On Board">🏴‍☠️</span>` : '';
    div.innerHTML = `
      ${isActive ? '<span class="active-crown">⚓</span>' : '<span style="width:14px;display:inline-block"></span>'}
      <span class="player-name" style="color:${colorCss}">${player.name}</span>
      ${boardedFlagHtml}
      <span class="player-pirates">☠️ ${player.pirates || 0}/${total}</span>
      <span class="player-barrels">🛢 ${player.barrels || 0}</span>
      ${coinsHtml}
      ${scoreHtml}
    `;
    bar.appendChild(div);
  });

  // Action log
  const logList = document.getElementById("log-list");
  logList.innerHTML = (gameState.action_log || []).slice().reverse()
    .map(e => `<p>${e}</p>`).join("");

  renderBoard();
}

// ── Character select screen ────────────────────────────────────────────────
function renderCharacterSelect() {
  let overlay = document.getElementById("character-select-overlay");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "character-select-overlay";
    overlay.style.cssText = `
      position:fixed; inset:0; background:#1e1206;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:60; padding:20px; gap:16px;
      overflow-y:auto;
    `;
    document.body.appendChild(overlay);
  }

  const hands = gameState.character_hands || [];
  const selections = gameState.character_selections || [];
  const confirmed = gameState.character_confirmed || [];
  const myHand = hands[myPlayerIndex] || [];
  const mySelection = selections[myPlayerIndex];
  const alreadyConfirmed = confirmed[myPlayerIndex];

  const confirmedCount = confirmed.filter(Boolean).length;
  const total = (gameState.players || []).length;

  overlay.innerHTML = `
    <h2 style="font-family:'Pirata One',cursive;color:#e8b84b;font-size:1.6rem;text-align:center;">
      Choose Your Captain
    </h2>
    <p style="color:#c9922a;font-style:italic;">
      ${alreadyConfirmed ? `${confirmedCount}/${total} captains ready` : "Select your captain and confirm"}
    </p>
    <div style="display:flex; gap:16px; flex-wrap:wrap; justify-content:center;">
      ${myHand.map(c => `
        <div class="char-card" data-name="${c.name}" style="
          width:150px; border:3px solid ${mySelection === c.name ? '#e8b84b' : '#6b3a1f'};
          border-radius:8px; padding:8px; cursor:${alreadyConfirmed ? 'default' : 'pointer'};
          opacity:${alreadyConfirmed && mySelection !== c.name ? '0.4' : '1'};
          background:#2a1810;
        ">
          <img src="${SERVER}/assets/${c.image}" style="width:100%;border-radius:4px;" onerror="this.style.display='none'">
          <p style="color:#f2dfa7;text-align:center;font-size:0.85rem;margin-top:6px;">${c.name}</p>
        </div>
      `).join("")}
    </div>
    ${!alreadyConfirmed ? `
      <button id="confirm-char-btn" class="action-btn" style="max-width:220px;" ${mySelection ? '' : 'disabled'}>
        Confirm
      </button>
    ` : `<p style="color:#c9922a;font-style:italic;">Waiting for other players...</p>`}
  `;

  if (!alreadyConfirmed) {
    overlay.querySelectorAll(".char-card").forEach(card => {
      card.onclick = () => {
        gameState.character_selections[myPlayerIndex] = card.dataset.name;
        renderCharacterSelect();
      };
    });
    const confirmBtn = document.getElementById("confirm-char-btn");
    if (confirmBtn) {
      confirmBtn.disabled = !mySelection;
      confirmBtn.onclick = () => {
        socket.emit("confirm_character", {
          room_id: myRoomId,
          player_index: myPlayerIndex,
          selected_name: mySelection,
          random_start: localStorage.getItem("rapRandomStart") === "true"
        });
      };
    }
  }
}

function buildActionButtons() {
  const container = document.getElementById("action-buttons");
  container.innerHTML = "";
  if (!gameState || gameState.phase === "character_select") return;
  const phase = gameState.phase;

  // Roll phases can apply to a player other than active_player (e.g. a
  // scorpion contest passes the roll around the table).
  if (phase === "roll_start") {
    if (gameState.next_roller === myPlayerIndex) {
      addActionBtn(container, "🎲 Roll the Die", "", () => {
        socket.emit("player_action", { room_id: myRoomId, type: "roll", player_index: myPlayerIndex });
      });
    } else {
      const rollerName = (gameState.players[gameState.next_roller] || {}).name || "Someone";
      container.innerHTML = `<p style="color:var(--rope);font-style:italic;text-align:center;">Waiting for ${rollerName} to roll...</p>`;
    }
    return;
  }

  if (phase === "roll_no_barrels" || phase === "roll_with_barrels" || phase === "roll_with_rerolls") {
    const rollerIndex = gameState.current_roll ? gameState.current_roll.player : null;
    if (rollerIndex === myPlayerIndex) {
      showRollResult(container);
    } else {
      const rollerName = (gameState.players[rollerIndex] || {}).name || "Someone";
      const rollValue = gameState.current_roll ? gameState.current_roll.roll : "?";
      container.innerHTML = `<p style="color:var(--rope);font-style:italic;text-align:center;">${rollerName} rolled a ${rollValue}...</p>`;
    }
    return;
  }

  // Pub invites go around the table to whoever is currently being asked,
  // not necessarily the active player.
  if (phase === "pub_invite") {
    const pub = gameState.pub;
    const askedIndex = pub ? pub.current_ask : null;
    if (askedIndex === myPlayerIndex) {
      const myCoins = gameState.players[myPlayerIndex].coins;
      const label = document.createElement("p");
      label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
      label.textContent = `Join the ${pub.color} pub for 1 coin?`;
      container.appendChild(label);
      addActionBtn(container, myCoins > 0 ? "Join (1 coin)" : "Join (no coins)", "", () => {
        if (myCoins <= 0) return;
        socket.emit("player_action", { room_id: myRoomId, type: "answer_pub_invite", joined: true, player_index: myPlayerIndex });
      });
      addActionBtn(container, "Stay Home", "secondary", () => {
        socket.emit("player_action", { room_id: myRoomId, type: "answer_pub_invite", joined: false, player_index: myPlayerIndex });
      });
    } else {
      const askedName = (gameState.players[askedIndex] || {}).name || "Someone";
      container.innerHTML = `<p style="color:var(--rope);font-style:italic;text-align:center;">Asking ${askedName} to join the pub...</p>`;
    }
    return;
  }

  if (phase === "dark_alley_ask") {
    const myCoins = gameState.players[myPlayerIndex].coins;
    const label = document.createElement("p");
    label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
    label.textContent = "Slip into the dark alley for 1 coin?";
    container.appendChild(label);
    addActionBtn(container, myCoins > 0 ? "Pay 1 Coin" : "No coins left", "", () => {
      if (myCoins <= 0) return;
      socket.emit("player_action", { room_id: myRoomId, type: "pay_dark_alley", accepted: true, player_index: myPlayerIndex });
    });
    addActionBtn(container, "Cancel Move", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "pay_dark_alley", accepted: false, player_index: myPlayerIndex });
    });
    return;
  }

  if (phase === "dark_alley_start") {
    const label = document.createElement("p");
    label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
    label.textContent = "Tap any other dark alley on the board to exit through.";
    container.appendChild(label);
    addActionBtn(container, "Cancel Move", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "cancel_dark_alley", player_index: myPlayerIndex });
    });
    return;
  }

  if (gameState.active_player !== myPlayerIndex) {
    container.innerHTML = `<p style="color:var(--rope);font-style:italic;text-align:center;">Waiting for your turn...</p>`;
    return;
  }

  if (phase === "guard_start") {
    const label = document.createElement("p");
    label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
    label.textContent = "Which guard will you challenge?";
    container.appendChild(label);
    addActionBtn(container, "Small Guard", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "choose_guard", guard_size: "small", player_index: myPlayerIndex });
    });
    addActionBtn(container, "Large Guard", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "choose_guard", guard_size: "large", player_index: myPlayerIndex });
    });
    return;
  }

  if (phase === "guard_battle") {
    const card = gameState.guard;
    if (card) {
      const isLarge = card.points > 3;
      const img = document.createElement("img");
      img.src = `${SERVER}/assets/guards/${card.image_file}`;
      img.style.cssText = "width:140px; display:block; margin:0 auto 10px; border-radius:6px; border:2px solid var(--gold);";
      container.appendChild(img);

      const label = document.createElement("p");
      label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
      const myPirates = gameState.players[myPlayerIndex].pirates;
      label.innerHTML = `Guard strength: <strong style="color:var(--gold-light)">${card.points}</strong> — you have <strong style="color:var(--gold-light)">${myPirates}</strong> pirates`;
      container.appendChild(label);
    }
    addActionBtn(container, "Fight!", "", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "fight_guard", player_index: myPlayerIndex });
      closeActionPanel();
    });
    return;
  }

  if (phase === "reclaim_1" || phase === "reclaim_2") {
    const label = document.createElement("p");
    label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
    label.textContent = phase === "reclaim_1"
      ? "Tap the first space to reclaim pirates from."
      : "Now tap a second space to complete the reclaim.";
    container.appendChild(label);
    addActionBtn(container, "Skip Reclaim", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "skip_reclaim", player_index: myPlayerIndex });
      closeActionPanel();
    });
    return;
  }

  if (phase === "reclaim_fail") {
    const label = document.createElement("p");
    label.style.cssText = "text-align:center; color:var(--red); margin-bottom:12px;";
    label.textContent = "Those spaces don't connect — no pirates reclaimed.";
    container.appendChild(label);
    addActionBtn(container, "Continue", "", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "acknowledge_reclaim_fail", player_index: myPlayerIndex });
      closeActionPanel();
    });
    return;
  }

  if (phase === "start_turn" || phase === "choose_action") {
    addActionBtn(container, "Go On Board", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "go_on_board", player_index: myPlayerIndex });
      closeActionPanel();
    });
    addActionBtn(container, "Rest", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "rest", player_index: myPlayerIndex });
      closeActionPanel();
    });
    addActionBtn(container, "View Action Log", "", () => { closeActionPanel(); toggleLog(); });
  } else if (phase === "rendezvous_card") {
    const card = gameState.rendezvous;
    if (card) {
      const img = document.createElement("img");
      img.src = `${SERVER}/assets/rendezvous/${card.image_file}`;
      img.style.cssText = "width:140px; display:block; margin:0 auto 10px; border-radius:6px; border:2px solid var(--gold);";
      container.appendChild(img);

      const label = document.createElement("p");
      label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
      label.textContent = `A rendezvous awaits — worth ${card.points} points if completed`;
      container.appendChild(label);
    }
    addActionBtn(container, "Collect Card", "", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "confirm_rendezvous", player_index: myPlayerIndex });
      closeActionPanel();
    });
  } else if (phase === "supply_card") {
    const card = gameState.supply;
    if (card) {
      const img = document.createElement("img");
      img.src = `${SERVER}/assets/supplies/${card.image_file}`;
      img.style.cssText = "width:140px; display:block; margin:0 auto 10px; border-radius:6px; border:2px solid var(--gold);";
      container.appendChild(img);

      const label = document.createElement("p");
      label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
      label.textContent = `Worth ${card.points} points — keep it, or sell it for 2 coins`;
      container.appendChild(label);
    }
    addActionBtn(container, "Keep Card", "", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "supply_choice", keep_card: true, player_index: myPlayerIndex });
      closeActionPanel();
    });
    addActionBtn(container, "Sell for 2 Coins", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "supply_choice", keep_card: false, player_index: myPlayerIndex });
      closeActionPanel();
    });
  } else if (phase === "har_supply") {
    const cardA = gameState.supply;
    const cardB = gameState.har_supply;

    const label = document.createElement("p");
    label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:10px;";
    label.textContent = "Choose one, or sell both for 2 coins";
    container.appendChild(label);

    const row = document.createElement("div");
    row.style.cssText = "display:flex; gap:8px; margin-bottom:12px;";

    [cardA, cardB].forEach((card, i) => {
      if (!card) return;
      const wrap = document.createElement("div");
      wrap.style.cssText = "flex:1; text-align:center;";
      const img = document.createElement("img");
      img.src = `${SERVER}/assets/supplies/${card.image_file}`;
      img.style.cssText = "width:100%; border-radius:6px; border:2px solid var(--gold); cursor:pointer;";
      img.onclick = () => {
        socket.emit("player_action", { room_id: myRoomId, type: "har_supply_choice", chosen_index: i, player_index: myPlayerIndex });
        closeActionPanel();
      };
      const pts = document.createElement("p");
      pts.style.cssText = "color:var(--gold-light); font-size:0.85rem; margin-top:4px;";
      pts.textContent = `${card.points} pts`;
      wrap.appendChild(img);
      wrap.appendChild(pts);
      row.appendChild(wrap);
    });
    container.appendChild(row);

    addActionBtn(container, "Sell Both for 2 Coins", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "har_supply_choice", chosen_index: null, player_index: myPlayerIndex });
      closeActionPanel();
    });
  } else if (phase === "post_move") {
    const myPlayer = gameState.players[myPlayerIndex];
    const canMoveAgain = myPlayer && myPlayer.coins > 0;
    addActionBtn(container, canMoveAgain ? "Move Again (1 coin)" : "Move Again (no coins)", "secondary", () => {
      if (!canMoveAgain) return;
      socket.emit("player_action", { room_id: myRoomId, type: "move_again", player_index: myPlayerIndex });
      closeActionPanel();
    });
    addActionBtn(container, "Avast (End Turn)", "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "avast", player_index: myPlayerIndex });
      closeActionPanel();
    });
    addActionBtn(container, "View Action Log", "", () => { closeActionPanel(); toggleLog(); });
  }
}

function showRollResult(container) {
  const roll = gameState.current_roll;
  const phase = gameState.phase;

  const dieImg = document.createElement("img");
  dieImg.src = `${SERVER}/assets/dice/${roll.image}`;
  dieImg.style.cssText = "width:140px; display:block; margin:0 auto 10px; border-radius:6px;";
  container.appendChild(dieImg);

  const label = document.createElement("p");
  label.style.cssText = "text-align:center; color:var(--parchment); margin-bottom:12px;";
  label.textContent = `You rolled a ${roll.roll}`;
  container.appendChild(label);

  const myPlayer = gameState.players[myPlayerIndex];

  if (phase === "roll_with_barrels" && myPlayer.barrels > 0) {
    addActionBtn(container, `Use Barrel to Reroll (${myPlayer.barrels} left)`, "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "reroll", player_index: myPlayerIndex });
    });
  } else if (phase === "roll_with_rerolls" && myPlayer.free_rerolls > 0) {
    addActionBtn(container, `Use Free Reroll (${myPlayer.free_rerolls} left)`, "secondary", () => {
      socket.emit("player_action", { room_id: myRoomId, type: "reroll", player_index: myPlayerIndex });
    });
  }

  addActionBtn(container, "Confirm Roll", "", () => {
    socket.emit("player_action", { room_id: myRoomId, type: "confirm_roll", player_index: myPlayerIndex });
    closeActionPanel();
  });
}

function addActionBtn(container, label, cls, fn) {
  const btn = document.createElement("button");
  btn.className = `action-btn ${cls}`;
  btn.textContent = label;
  btn.onclick = fn;
  container.appendChild(btn);
}

// ── Panels ────────────────────────────────────────────────────────────────────
function toggleActionPanel() {
  buildActionButtons();
  document.getElementById("action-panel").classList.toggle("open");
}
function closeActionPanel() {
  document.getElementById("action-panel").classList.remove("open");
}
function toggleLog() {
  document.getElementById("log-panel").classList.toggle("open");
}

// ── Inventory ─────────────────────────────────────────────────────────────────
const CARD_FOLDERS_INV = {
  pubs: "pubs",
  maps: "maps",
  treasure: "treasure",
  scorpions: "treasure",
  large_guard: "guards",
  small_guard: "guards",
  supplies: "supplies",
  rendezvous: "rendezvous",
  wrangles: "wrangle"
};

function toggleInventory() {
  const overlay = document.getElementById("inventory-overlay");
  const opening = !overlay.classList.contains("open");
  overlay.classList.toggle("open");
  if (opening) renderInventory();
}

function renderInventory() {
  const content = document.getElementById("inventory-content");
  const player = gameState.players[myPlayerIndex];
  if (!player) { content.innerHTML = ""; return; }

  const groups = [
    { key: "pubs", label: "Pubs" },
    { key: "maps", label: "Maps" },
    { key: "treasure", label: "Treasure" },
    { key: "scorpions", label: "Scorpions" },
    { key: "large_guard", label: "Large Guards" },
    { key: "small_guard", label: "Small Guards" },
    { key: "supplies", label: "Supplies" },
    { key: "rendezvous", label: "Rendezvous" },
    { key: "wrangles", label: "Wrangle" }
  ];

  const html = groups.map(g => {
    const cards = player[g.key] || [];
    if (!cards.length) return "";
    const folder = CARD_FOLDERS_INV[g.key] || g.key;
    // Rendezvous cards only count toward score once completed
    const totalPoints = cards.reduce((sum, c) => {
      if (g.key === "rendezvous") return sum + (c.completed ? (c.points || 0) : 0);
      return sum + (c.points || 0);
    }, 0);
    return `
      <div>
        <div class="inv-group-label">${g.label} (${totalPoints} pts)</div>
        <div class="inv-cards">
          ${cards.map(c => `
            <div class="inv-card-wrap">
              <img class="inv-card" src="${SERVER}/assets/${folder}/${c.image_file}" onerror="this.style.display='none'">
              ${g.key === "rendezvous" && c.completed ? '<div class="inv-card-completed-badge">✕</div>' : ''}
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }).join("");

  content.innerHTML = html || `<p style="color:var(--rope); font-style:italic; text-align:center;">No cards collected yet.</p>`;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, duration = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

// ── Loading ───────────────────────────────────────────────────────────────────
function setLoading(msg) {
  document.getElementById("loading-msg").textContent = msg;
}
function hideLoading() {
  document.getElementById("loading").style.display = "none";
}

// ── Asset loading ─────────────────────────────────────────────────────────────
async function loadTileData() {
  setLoading("Loading tile data...");
  const res = await fetch(`${SERVER}/assets/tiles`);
  tileData = await res.json();
}

function loadTileImages() {
  return new Promise((resolve) => {
    setLoading("Loading tile images...");
    tileImages = new Array(9).fill(null);
    let loaded = 0;
    for (let i = 1; i <= 9; i++) {
      const img = new Image();
      img.onload = () => {
        tileImages[i - 1] = img;
        loaded++;
        setLoading(`Loading tiles... ${loaded}/9`);
        if (loaded === 9) resolve();
      };
      img.onerror = () => { loaded++; if (loaded === 9) resolve(); };
      img.src = `${SERVER}/assets/tiles/tile_${i}.jpg`;
    }
  });
}

// ── Socket connection ─────────────────────────────────────────────────────────
function connectToGame(name, roomId, playerIndex) {
  myName = name;
  myRoomId = roomId;
  myPlayerIndex = playerIndex;

  setLoading("Connecting to game...");
  socket = io(SERVER, { transports: ["websocket"] });

  socket.on("connect", () => {
    setLoading("Joining room...");
    socket.emit("join_room", { room_id: roomId, name });
  });

  socket.on("room_joined", (data) => {
    myPlayerIndex = data.player_index;
    setLoading("Waiting for game state...");
  });

  socket.on("state_updated", (data) => {
    gameState = data.game_state;

    // Always resolve player index by name — seat order can shuffle server-side
    if (gameState.players && myName) {
      const idx = gameState.players.findIndex(p => p.name === myName);
      if (idx !== -1) myPlayerIndex = idx;
    }

    // JSON converts integer dict keys to strings — convert back
    if (gameState.space_lookup) {
      const fixed = {};
      Object.entries(gameState.space_lookup).forEach(([k, v]) => { fixed[parseInt(k)] = v; });
      gameState.space_lookup = fixed;
    }
    if (gameState.captain_graph) {
      const fixed = {};
      Object.entries(gameState.captain_graph).forEach(([k, v]) => { fixed[parseInt(k)] = v; });
      gameState.captain_graph = fixed;
    }
    if (gameState.alley_lookup) {
      const fixed = {};
      Object.entries(gameState.alley_lookup).forEach(([k, v]) => { fixed[parseInt(k)] = v; });
      gameState.alley_lookup = fixed;
    }

    if (gameState && gameState.board_seed && boardSpaces.length === 0) {
      setLoading("Building board...");
      const { allSpaces, spaceLookup } = buildBoardFromSeed(gameState.board_seed);
      boardSpaces = allSpaces;
      spaceLoookup = spaceLookup;
      needsBoardSizing = true;
    }
    updateUI();
    buildActionButtons();

    // Auto-surface the actions panel when it's this player's moment to
    // act on a roll — easy to miss otherwise since it can happen outside
    // their normal turn (e.g. a scorpion contest).
    const rollPhases = ["roll_start", "roll_no_barrels", "roll_with_barrels", "roll_with_rerolls"];
    if (rollPhases.includes(gameState.phase)) {
      const rollerIndex = gameState.phase === "roll_start"
        ? gameState.next_roller
        : (gameState.current_roll || {}).player;
      if (rollerIndex === myPlayerIndex) {
        document.getElementById("action-panel").classList.add("open");
      }
    }
    if (gameState.phase === "rendezvous_card" && gameState.active_player === myPlayerIndex) {
      document.getElementById("action-panel").classList.add("open");
    }
    if ((gameState.phase === "supply_card" || gameState.phase === "har_supply") && gameState.active_player === myPlayerIndex) {
      document.getElementById("action-panel").classList.add("open");
    }
    if (gameState.phase === "pub_invite" && gameState.pub && gameState.pub.current_ask === myPlayerIndex) {
      document.getElementById("action-panel").classList.add("open");
    }
    if ((gameState.phase === "dark_alley_ask" || gameState.phase === "dark_alley_start") && gameState.active_player === myPlayerIndex) {
      document.getElementById("action-panel").classList.add("open");
    }
    if ((gameState.phase === "guard_start" || gameState.phase === "guard_battle") && gameState.active_player === myPlayerIndex) {
      document.getElementById("action-panel").classList.add("open");
    }
    if ((gameState.phase === "reclaim_1" || gameState.phase === "reclaim_2" || gameState.phase === "reclaim_fail") && gameState.active_player === myPlayerIndex) {
      document.getElementById("action-panel").classList.add("open");
    }

    if (needsBoardSizing) {
      requestAnimationFrame(() => {
        initBoardSize();
        resizeCanvas();
      });
    }
    hideLoading();
  });

  socket.on("game_state_update", (gs) => {
    gameState = gs;
    updateUI();
    hideLoading();
  });

  socket.on("action_received", (data) => {
    showToast(`${data.type} action received`);
  });

  socket.on("disconnect", () => {
    showToast("Disconnected from server", 5000);
  });

  socket.on("connect_error", () => {
    setLoading("Connection failed. Retrying...");
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener("resize", resizeCanvas);

(async () => {
  // Read params from URL: game.html?name=Jeff&room=ABC123&index=0
  const params = new URLSearchParams(window.location.search);
  const name  = params.get("name")  || localStorage.getItem("rapName")  || "";
  const room  = params.get("room")  || localStorage.getItem("rapRoom")  || "";
  const index = parseInt(params.get("index") || localStorage.getItem("rapIndex") || "0");

  if (!name || !room) {
    setLoading("Missing name or room. Please join from the lobby.");
    return;
  }

  await loadTileData();
  await loadTileImages();
  connectToGame(name, room, index);
})();
</script>
